---
title: RubyLLM
description: One beautiful API for ChatGPT, Claude, Gemini, and more. Chat, images,
  embeddings, tools.
lang: en-US
timezone: Europe/Berlin
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    block:
      line_numbers: false
permalink: pretty
collections:
  introduction:
    output: true
    permalink: "/:name/"
  core_features:
    output: true
    permalink: "/:name/"
  advanced:
    output: true
    permalink: "/:name/"
  reference:
    output: true
    permalink: "/:name/"
defaults:
- scope:
    path: ''
  values:
    layout: default
- scope:
    type: introduction
  values:
    layout: default
- scope:
    type: core_features
  values:
    layout: default
- scope:
    type: advanced
  values:
    layout: default
- scope:
    type: reference
  values:
    layout: default
jekyll_vitepress:
  branding:
    site_title: false
    logo:
      default: "/assets/images/favicon/favicon-96x96.png"
      light: "/assets/images/logotype.svg"
      dark: "/assets/images/logotype_dark.svg"
      alt: RubyLLM
      width: 150
      height: 32
  typography:
    body_font_family: "'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI',
      sans-serif"
    code_font_family: "'IBM Plex Mono', ui-monospace, monospace"
    google_fonts_url: "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=Inter:wght@400;700&family=Lora:wght@400;500;700&display=swap"
  syntax:
    light_theme: gruvbox.light
    dark_theme: gruvbox.dark
  tokens:
    light:
      "--vp-c-brand-1": "#c9271e"
      "--vp-c-brand-2": "#e2462f"
      "--vp-c-brand-3": "#9e1209"
      "--vp-c-brand-soft": rgba(201, 39, 30, 0.14)
      "--vp-c-bg": "#f7f3f1"
      "--vp-c-bg-alt": "#f2e9e3"
      "--vp-c-bg-soft": "#f1e9e4"
      "--vp-c-bg-elv": "#ffffff"
      "--vp-c-border": "#d4c4bb"
      "--vp-c-text-1": "#231f24"
      "--vp-c-text-2": "#5c5359"
      "--vp-c-text-3": "#7f7279"
      "--vp-c-default-1": "#f0e3db"
      "--vp-c-default-2": "#e8d9cf"
      "--vp-c-default-3": "#dfcfc4"
      "--vp-c-divider": "#ddd1ca"
      "--vp-c-gutter": "#e8ddd7"
      "--vp-nav-logo-height": 32px
      "--vp-home-hero-name-color": var(--vp-c-brand-1)
      "--vp-home-hero-name-background": 'linear-gradient(120deg, #e24a2f 28%, #9f1406
        78%)'
    dark:
      "--vp-c-brand-1": "#ff7a64"
      "--vp-c-brand-2": "#ff9b88"
      "--vp-c-brand-3": "#d44b36"
      "--vp-c-brand-soft": rgba(255, 122, 100, 0.16)
      "--vp-c-bg": "#171315"
      "--vp-c-bg-alt": "#201a1d"
      "--vp-c-bg-soft": "#221d20"
      "--vp-c-bg-elv": "#2a2428"
      "--vp-c-border": "#4a3b42"
      "--vp-c-text-1": "#f5ede8"
      "--vp-c-text-2": "#cebeb5"
      "--vp-c-text-3": "#9f8d95"
      "--vp-c-default-1": "#32292e"
      "--vp-c-default-2": "#3a2f35"
      "--vp-c-default-3": "#473940"
      "--vp-c-divider": "#3b3136"
      "--vp-c-gutter": "#2f272b"
      "--vp-nav-logo-height": 32px
      "--vp-home-hero-name-color": var(--vp-c-brand-1)
      "--vp-home-hero-name-background": 'linear-gradient(120deg, #ff9b82 28%, #ff5e4a
        76%)'
  github_star:
    enabled: true
    repository: crmne/ruby_llm
    text: Star
    show_count: true
  footer:
    enabled: true
    show_on_docs: false
    message: >-
      Brought to you by <a href="https://paolino.me" target="_blank" rel="noreferrer">Carmine Paolino</a>, maker of
    copyright: >-
      <span class="footer-chatwithwork-line"><a class="footer-chatwithwork-link" href="https://chatwithwork.com" target="_blank" rel="noreferrer"><img class="footer-chatwithwork-logo" src="https://chatwithwork.com/logotype.svg" alt="Chat with Work"></a></span><span class="footer-built-with">Docs built with <a href="https://jekyll-vitepress.dev" target="_blank" rel="noreferrer">JekyllvitePress</a>.</span>
  doc_footer:
    enabled: true
    previous_label: Previous page
    next_label: Next page
  last_updated:
    enabled: true
    text: Last updated
    format: "%-d %b %Y, %H:%M"
  labels:
    outline: On this page
    sidebar_menu: Menu
    return_to_top: Return to top
    skip_to_content: Skip to content
    appearance_menu: Appearance
    switch_to_dark: Switch to dark theme
    switch_to_light: Switch to light theme
  behavior:
    scroll_offset: 134
  edit_link:
    enabled: true
    pattern: https://github.com/crmne/ruby-llm-docs/edit/main/:path
    text: Edit this page on GitHub
plugins:
- jekyll-redirect-from
- jekyll-vitepress-theme
models:
  default_chat: gpt-5-nano
  default_embedding: text-embedding-3-small
  default_image: gpt-image-1.5
  openai_latest: gpt-5.4
  openai_current: gpt-5-nano
  openai_vision: gpt-5.4
  openai_tools: gpt-5.4
  openai_mini: gpt-5-mini
  openai_audio: gpt-4o-audio-preview
  openai_legacy: gpt-3.5-turbo
  openai_standard: gpt-5.4
  anthropic_latest: claude-sonnet-4-6
  anthropic_current: claude-sonnet-4-6
  anthropic_newest: claude-sonnet-4-6
  anthropic_opus: claude-opus-4-6
  gemini_latest: gemini-3.1-pro-preview
  gemini_current: gemini-3.1-pro-preview
  gemini_current_latest: gemini-3.1-pro-preview
  embedding_small: text-embedding-3-small
  embedding_large: text-embedding-3-large
  embedding_google: text-embedding-004
  image_openai: gpt-image-1.5
  image_dalle: dall-e-3
  image_google: imagen-3.0-generate-002
  local_llama: llama-3
  best_for_code: gpt-5.4
  best_for_creative: claude-opus-4-6
  best_for_factual: gemini-3.1-pro-preview
  best_for_vision: gpt-5.4
  best_for_audio: gpt-4o-audio-preview
  best_for_tools: gpt-5.4
  best_for_budget: gemini-3-flash-preview
exclude:
- README.md
- LICENSE
- Gemfile
- Gemfile.lock
- moved-from-theme-repo
- _site
- ".jekyll-cache"
- ".sass-cache"
- vendor
- ".bundle"
theme: jekyll-vitepress-theme
